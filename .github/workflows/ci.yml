name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  e2e-api:
    name: E2E API smoke (scripts/e2e.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase stack
        run: npx supabase start --ignore-health-check

      - name: Bootstrap admin supervisor
        run: bash scripts/ci-setup.sh

      - name: Serve Edge Functions in background
        run: |
          npx supabase functions serve --no-verify-jwt > /tmp/functions.log 2>&1 &
          echo $! > /tmp/functions.pid
          sleep 8
          # Sanity check: edge functions should respond
          curl -fsS -X OPTIONS http://127.0.0.1:54321/functions/v1/punch-submit || echo "(functions startup is async; tests will tolerate)"

      - name: Run API E2E
        env:
          API_URL: ${{ env.API_URL }}
          ANON_KEY: ${{ env.ANON_KEY }}
          SUPERVISOR_EMAIL: ${{ env.ADMIN_EMAIL }}
          SUPERVISOR_PASS: ${{ env.ADMIN_PASSWORD }}
        run: bash scripts/e2e.sh

      - name: Tail Edge Functions log on failure
        if: failure()
        run: tail -50 /tmp/functions.log || true

      - name: Stop Supabase stack
        if: always()
        run: |
          kill "$(cat /tmp/functions.pid 2>/dev/null)" 2>/dev/null || true
          npx supabase stop || true

  e2e-ui:
    name: E2E UI (Playwright + Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @attendance/web exec playwright install --with-deps chromium

      - name: Start Supabase stack
        run: npx supabase start --ignore-health-check

      - name: Bootstrap admin supervisor
        run: bash scripts/ci-setup.sh

      - name: Build app
        run: pnpm build

      - name: Serve Edge Functions in background
        run: |
          npx supabase functions serve --no-verify-jwt > /tmp/functions.log 2>&1 &
          echo $! > /tmp/functions.pid
          sleep 8

      - name: Serve built app on port 4173
        run: |
          pnpm --filter @attendance/web exec vite preview --port 4173 --host 127.0.0.1 > /tmp/preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          # wait for ready
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done

      - name: Run Playwright UI tests
        working-directory: apps/web
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_SUPABASE_URL: ${{ env.API_URL }}
          E2E_ANON_KEY: ${{ env.ANON_KEY }}
          E2E_SUPERVISOR_EMAIL: ${{ env.ADMIN_EMAIL }}
          E2E_SUPERVISOR_PASS: ${{ env.ADMIN_PASSWORD }}
        run: pnpm exec playwright test --reporter=list

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Tail logs on failure
        if: failure()
        run: |
          echo "=== functions ===" && tail -50 /tmp/functions.log || true
          echo "=== preview ===" && tail -50 /tmp/preview.log || true

      - name: Cleanup
        if: always()
        run: |
          kill "$(cat /tmp/preview.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/functions.pid 2>/dev/null)" 2>/dev/null || true
          npx supabase stop || true
